name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck & build
        env:
          # Public anon URL/key placeholders so `supabase-js` initializes at
          # build time. These are NOT used at runtime in CI.
          VITE_SUPABASE_URL: https://ci.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-anon-key
        run: npm run build
